name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - run: npm test
        env:
          ANTHROPIC_API_KEY: test
          WA_ACCESS_TOKEN: test
          WA_PHONE_NUMBER_ID: test
          VERIFY_TOKEN: test
          BANK_HOLDER_NAME: Test
          BANK_HOLDER_CC: '123'
          BANCOLOMBIA_ACCOUNT: '123'
          NEQUI_NUMBER: '123'
          DAVIVIENDA_ACCOUNT: '123'
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test
          CONSULTATION_PRICE: '50000'
          BOOK_PRICE: '20000'
          MIN_RANGE_PRICE: '1000000'
          MAX_RANGE_PRICE: '5000000'
          DEBUG_API_KEY: test

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true
